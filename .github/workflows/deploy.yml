name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/moktak-3d-action-game-br70jv
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # dist를 gh-pages 브랜치로 푸시 — 브랜치 생성 시 GitHub Pages가 자동 활성화된다
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
